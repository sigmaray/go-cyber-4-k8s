<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Task Manager</span>
    </div>
  </nav>

  <main class="container" id="app">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header">New Task</div>
          <div class="card-body">
            <form id="create-task-form" action="/tasks" method="POST">
              <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" name="title" required data-cy="task-title-input">
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3" data-cy="task-description-input"></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100" data-cy="create-task-btn">Create Task</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span>Tasks</span>
            <span class="badge bg-secondary" data-cy="task-count">{{ len .tasks }}</span>
          </div>
          <div class="card-body p-0">
            {{ if not .tasks }}
            <p class="text-muted p-4 mb-0" data-cy="empty-state">No tasks yet. Create your first one!</p>
            {{ else }}
            <div class="list-group list-group-flush" data-cy="task-list">
              {{ range .tasks }}
              <div class="list-group-item" data-cy="task-item" data-task-id="{{ .ID }}">
                <form action="/tasks/{{ .ID }}/update" method="POST" class="row g-2 align-items-start">
                  <div class="col-md-4">
                    <input type="text" class="form-control form-control-sm" name="title" value="{{ .Title }}" data-cy="edit-title">
                  </div>
                  <div class="col-md-5">
                    <input type="text" class="form-control form-control-sm" name="description" value="{{ .Description }}" data-cy="edit-description">
                  </div>
                  <div class="col-md-1 d-flex align-items-center">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="done" id="done-{{ .ID }}" {{ if .Done }}checked{{ end }} data-cy="edit-done">
                      <label class="form-check-label" for="done-{{ .ID }}">Done</label>
                    </div>
                  </div>
                  <div class="col-md-2 d-flex gap-1">
                    <button type="submit" class="btn btn-sm btn-outline-success" data-cy="save-task-btn">Save</button>
                  </div>
                </form>
                <form action="/tasks/{{ .ID }}/delete" method="POST" class="mt-2">
                  <button type="submit" class="btn btn-sm btn-outline-danger" data-cy="delete-task-btn">Delete</button>
                </form>
              </div>
              {{ end }}
            </div>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
